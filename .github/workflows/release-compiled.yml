# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release (compiled binaries)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset: salmon-loop-darwin-arm64
          - runner: macos-13
            asset: salmon-loop-darwin-x64
          - runner: ubuntu-latest
            asset: salmon-loop-linux-x64-gnu
          - runner: windows-latest
            asset: salmon-loop-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build compiled binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          bun build --compile src/cli/index.ts --outfile "dist-bin/${{ matrix.asset }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist-bin/${{ matrix.asset }}"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist-bin/${{ matrix.asset }}
          if-no-files-found: error

  build_linux_musl:
    name: Build salmon-loop-linux-x64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build in Alpine (musl)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-bin
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            alpine:3.20 \
            sh -lc '
              set -euo pipefail
              apk add --no-cache bash curl unzip build-base python3
              curl -fsSL https://bun.sh/install | bash
              export PATH="/root/.bun/bin:$PATH"
              bun --version
              bun install --frozen-lockfile
              bun build --compile src/cli/index.ts --outfile dist-bin/salmon-loop-linux-x64-musl
              chmod +x dist-bin/salmon-loop-linux-x64-musl
            '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: salmon-loop-linux-x64-musl
          path: dist-bin/salmon-loop-linux-x64-musl
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build_linux_musl
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-bin
      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          find dist-bin -type f -maxdepth 2 -print0 | xargs -0 -I{} mv {} out/
          rmdir dist-bin/* 2>/dev/null || true
          mv out dist-bin
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist-bin
          sha256sum * > SHA256SUMS
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist-bin/*
