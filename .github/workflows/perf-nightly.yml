# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Perf Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    env:
      RUN_A2A_PERF_BENCHMARKS: '1'
      RUN_A2A_NETWORK_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: '1.3.10'
      - name: Run Full Performance Suite
        run: bun run test:perf:all
      - name: Run Network Integration Suite
        run: bun run test:integration:network
