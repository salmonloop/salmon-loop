# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      bun-version:
        required: false
        type: string
        default: '1.3.10'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Verify
        run: bun run verify

  publish-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Build package
        run: bun run build
      - name: Pack npm tarball
        shell: bash
        run: npm pack --json > pack-output.json
      - name: Install tarball in temp directory
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(bun -e "const items = JSON.parse(await Bun.file('pack-output.json').text()); process.stdout.write(items[0].filename);")"
          TARBALL_PATH="$(pwd)/${TARBALL}"
          mkdir -p .tmp/publish-smoke
          cd .tmp/publish-smoke
          if [ ! -f package.json ]; then
            printf '%s\n' '{"name":"publish-smoke","private":true}' > package.json
          fi
          bun add "${TARBALL_PATH}"
      - name: Smoke test CLI entrypoints
        shell: bash
        run: |
          set -euo pipefail
          cd .tmp/publish-smoke
          BIN="$(bun pm bin)/s8p"
          if [ ! -f "${BIN}" ]; then
            echo "Expected CLI entrypoint not found at: ${BIN}"
            echo "bun pm bin: $(bun pm bin)"
            ls -la "$(bun pm bin)" || true
            exit 1
          fi
          "$BIN" --help
          "$BIN" run --help
          "$BIN" serve --help
