# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      bun-version:
        required: false
        type: string
        default: '1.3.9'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: Check target-runtime boundary
        run: bun run check:target-runtime-boundary
      - name: Check bun purity
        run: bun run check:bun-purity
      - name: Runtime boundary unit tests
        run: bun run test:runtime-boundary
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun run test:full
