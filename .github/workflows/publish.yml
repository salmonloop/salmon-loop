# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (tag or branch) to publish'
        required: true
        default: 'main'

jobs:
  quality:
    uses: ./.github/workflows/reusable-test.yml
    with:
      bun-version: '1.3.10'

  publish:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    env:
      TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: '1.3.10'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pinned to Node 24.7.0 to ensure npm >= 11.5.1 required for OIDC publish.
          # Node 24.7.0 bundles npm 11.5.1 per the Node.js release manifest.
          node-version: '24.7.0'
      - name: Verify tag matches package.json
        shell: bash
        run: |
          set -euo pipefail
          REF="${TARGET_REF}"
          if [[ "${REF}" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"
          elif [[ "${REF}" == v*.*.* ]]; then
            TAG="${REF}"
          else
            exit 0
          fi
          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag ${TAG} does not match package.json version ${VERSION}."
            exit 1
          fi
      - name: Verify tag is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune --tags origin main
          git merge-base --is-ancestor HEAD "origin/main"
      - name: Build
        run: bun run build
      - name: Diagnostics (OIDC match)
        shell: bash
        run: |
          set -euo pipefail
          echo "target_ref: ${TARGET_REF}"
          printf 'npm: '
          npm --version
          printf 'npm registry: '
          npm config get registry
          printf 'npm globalconfig: '
          npm config get globalconfig
          printf 'npm user-agent: '
          npm config get user-agent
          echo "event: ${GITHUB_EVENT_NAME}"
          echo "repository: ${GITHUB_REPOSITORY}"
          echo "workflow_ref: ${GITHUB_WORKFLOW_REF}"
          echo "ref: ${GITHUB_REF}"
          echo "ref_name: ${GITHUB_REF_NAME}"
          echo "sha: ${GITHUB_SHA}"
          echo "run_id: ${GITHUB_RUN_ID}"
          echo "run_attempt: ${GITHUB_RUN_ATTEMPT}"
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NODE_AUTH_TOKEN: set"
          else
            echo "NODE_AUTH_TOKEN: unset"
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG}"
            if [ -f "${NPM_CONFIG_USERCONFIG}" ]; then
              if grep -q "_authToken" "${NPM_CONFIG_USERCONFIG}"; then
                echo "NPM_CONFIG_USERCONFIG contains _authToken line(s)"
              else
                echo "NPM_CONFIG_USERCONFIG does not contain _authToken line(s)"
              fi
            else
              echo "NPM_CONFIG_USERCONFIG file does not exist"
            fi
          else
            echo "NPM_CONFIG_USERCONFIG: unset"
          fi
      - name: Publish (OIDC)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          # Ensure we don't accidentally publish with token auth.
          unset NODE_AUTH_TOKEN || true
          OIDC_NPMRC="${RUNNER_TEMP}/npmrc-oidc"
          : > "${OIDC_NPMRC}"
          export NPM_CONFIG_USERCONFIG="${OIDC_NPMRC}"
          npm config set registry "https://registry.npmjs.org/"

          REQUIRED_NPM="11.5.1"
          CURRENT_NPM="$(npm --version)"
          if ! bun -e "const [req, curRaw] = ['${REQUIRED_NPM}', '${CURRENT_NPM}']; const cur = curRaw.split('-')[0]; const to = (v) => v.split('.').map((n) => Number(n)); const [r1, r2, r3] = to(req); const [c1, c2, c3] = to(cur); const ok = c1 > r1 || (c1 === r1 && (c2 > r2 || (c2 === r2 && c3 >= r3))); if (!ok) { process.exit(1); }"; then
            echo "npm raw version: ${CURRENT_NPM}"
            echo "npm ${CURRENT_NPM} is below required ${REQUIRED_NPM} for OIDC publish."
            exit 1
          fi

          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          if npm view salmon-loop@"${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published. Skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
      - name: Publish (token fallback)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not set."
            exit 1
          fi
          TOKEN_NPMRC="${RUNNER_TEMP}/npmrc-token"
          : > "${TOKEN_NPMRC}"
          export NPM_CONFIG_USERCONFIG="${TOKEN_NPMRC}"
          npm config set registry "https://registry.npmjs.org/"
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          printf 'npm: '
          npm --version
          printf 'npm registry: '
          npm config get registry
          printf 'npm globalconfig: '
          npm config get globalconfig
          printf 'npm user-agent: '
          npm config get user-agent
          if ! npm whoami >/dev/null 2>&1; then
            echo "npm whoami: not available for this token (non-fatal)."
          else
            echo "npm whoami: $(npm whoami)"
          fi
          # Helpful for diagnosing EOTP. Some token types (e.g. automation/granular) may not
          # have permission to read profile details; treat 403 as non-fatal and informational.
          if ! npm profile get "two-factor auth" 2>/dev/null; then
            echo "npm profile get (two-factor auth) not accessible for this token (non-fatal)."
          fi
          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          if npm view salmon-loop@"${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published. Skipping publish."
            exit 0
          fi
          npm publish --access public
