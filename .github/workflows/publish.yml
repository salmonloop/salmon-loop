# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  quality:
    uses: ./.github/workflows/reusable-test.yml
    with:
      bun-version: '1.3.10'

  publish:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
        with:
          bun-version: '1.3.10'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          check-latest: true
      - name: Ensure npm for OIDC
        shell: bash
        run: |
          set -euo pipefail
          npm install -g npm@11.5.1
          echo "node: $(bun -p \"process.versions.node\")"
          echo "npm: $(npm --version)"
      - name: Verify tag matches package.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          EXPECTED="v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag ${TAG} does not match package.json version ${VERSION}."
            exit 1
          fi
      - name: Verify tag is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --prune origin main
          git merge-base --is-ancestor "$GITHUB_REF_NAME" "origin/main"
      - name: Build
        run: bun run build
      - name: Diagnostics (OIDC match)
        shell: bash
        run: |
          set -euo pipefail
          echo "node: $(bun -p \"process.versions.node\")"
          echo "npm: $(npm --version)"
          echo "event: ${GITHUB_EVENT_NAME}"
          echo "repository: ${GITHUB_REPOSITORY}"
          echo "workflow_ref: ${GITHUB_WORKFLOW_REF}"
          echo "ref: ${GITHUB_REF}"
          echo "ref_name: ${GITHUB_REF_NAME}"
          echo "sha: ${GITHUB_SHA}"
          echo "run_id: ${GITHUB_RUN_ID}"
          echo "run_attempt: ${GITHUB_RUN_ATTEMPT}"
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NODE_AUTH_TOKEN: set"
          else
            echo "NODE_AUTH_TOKEN: unset"
          fi
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG}"
            if [ -f "${NPM_CONFIG_USERCONFIG}" ]; then
              if grep -q "_authToken" "${NPM_CONFIG_USERCONFIG}"; then
                echo "NPM_CONFIG_USERCONFIG contains _authToken line(s)"
              else
                echo "NPM_CONFIG_USERCONFIG does not contain _authToken line(s)"
              fi
            else
              echo "NPM_CONFIG_USERCONFIG file does not exist"
            fi
          else
            echo "NPM_CONFIG_USERCONFIG: unset"
          fi
      - name: Publish (OIDC)
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          # Ensure we don't accidentally publish with token auth.
          unset NODE_AUTH_TOKEN || true
          npm config set registry "https://registry.npmjs.org/"

          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          if npm view salmon-loop@"${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published. Skipping publish."
            exit 0
          fi
          npm publish --access public --provenance
      - name: Publish (token fallback)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not set."
            exit 1
          fi
          npm config set registry "https://registry.npmjs.org/"
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          echo "node: $(bun -p \"process.versions.node\")"
          echo "npm: $(npm --version)"
          echo "npm whoami: $(npm whoami)"
          # Helpful for diagnosing EOTP. Some token types (e.g. automation/granular) may not
          # have permission to read profile details; treat 403 as non-fatal and informational.
          if ! npm profile get "two-factor auth" 2>/dev/null; then
            echo "npm profile get (two-factor auth) not accessible for this token (non-fatal)."
          fi
          VERSION="$(bun -e "const pkg = JSON.parse(await Bun.file('package.json').text()); process.stdout.write(pkg.version)")"
          if npm view salmon-loop@"${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} already published. Skipping publish."
            exit 0
          fi
          npm publish --access public
